name: Build Windows

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows x64 (MSYS2 MinGW64 Qt5)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      # ── 1. MSYS2 prima del checkout (evita problemi line-ending) ──────────
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-translations
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-libtiff
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-zlib

      # ── 2. Checkout ───────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 3. Configure ──────────────────────────────────────────────────────
      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/mingw64 \
            -DENABLE_POPPLER=OFF

      # ── 4. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel

      # ── 5. Package ────────────────────────────────────────────────────────
      # Non usiamo windeployqt (esce con errore per libGLESv2 in MSYS2 e non
      # copia i plugin). Usiamo invece objdump per trovare tutte le DLL in
      # modo ricorsivo, poi copiamo i plugin Qt direttamente da MSYS2.
      - name: Package
        run: |
          mkdir -p dist/platforms dist/styles dist/imageformats dist/printsupport

          # Eseguibili
          cp build/scantailor.exe dist/
          cp build/scantailor-cli.exe dist/ 2>/dev/null || true

          # Pass 1: DLL dirette dell'exe
          objdump -p build/scantailor.exe \
            | grep 'DLL Name:' | awk '{print $NF}' \
            | while read dll; do
                [ -f "/mingw64/bin/$dll" ] && cp -n "/mingw64/bin/$dll" dist/
              done

          # Pass 2: DLL transitive (dipendenze delle DLL già copiate)
          for dll in dist/*.dll; do
            objdump -p "$dll" 2>/dev/null | grep 'DLL Name:' | awk '{print $NF}' \
              | while read dep; do
                  [ -f "/mingw64/bin/$dep" ] && cp -n "/mingw64/bin/$dep" dist/
                done
          done

          # Plugin Qt (obbligatori — senza platforms/qwindows.dll Qt non parte)
          QT_PLUGINS=/mingw64/share/qt5/plugins
          cp "$QT_PLUGINS/platforms/qwindows.dll"   dist/platforms/
          cp "$QT_PLUGINS/platforms/qminimal.dll"   dist/platforms/ 2>/dev/null || true
          cp "$QT_PLUGINS/imageformats/"*.dll       dist/imageformats/ 2>/dev/null || true
          cp "$QT_PLUGINS/styles/"*.dll             dist/styles/      2>/dev/null || true
          cp "$QT_PLUGINS/printsupport/"*.dll       dist/printsupport/ 2>/dev/null || true

          # Riepilogo
          echo "=== dist/ ==="
          find dist -name '*.dll' -o -name '*.exe' | sort
          echo "Totale DLL: $(find dist -name '*.dll' | wc -l)"

      # ── 6. ZIP con PowerShell ──────────────────────────────────────────────
      - name: Create ZIP
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath ScanTailor-Windows-x64.zip

      # ── 7. Upload ─────────────────────────────────────────────────────────
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ScanTailor-Windows-x64
          path: ScanTailor-Windows-x64.zip
          if-no-files-found: error
