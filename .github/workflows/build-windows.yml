name: Build Windows

on:
  push:
    branches: [ master, modernization, 'claude/**' ]
  pull_request:
    branches: [ master, modernization ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows x64 (MSYS2 MinGW64 Qt5)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      # ── 1. MSYS2 prima del checkout (evita problemi line-ending) ──────────
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-translations
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-libtiff
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-poppler
            mingw-w64-x86_64-poppler-qt5
            mingw-w64-x86_64-potrace
            mingw-w64-x86_64-tesseract-ocr
            mingw-w64-x86_64-leptonica
            mingw-w64-x86_64-tesseract-data-eng
            mingw-w64-x86_64-tesseract-data-ita
            mingw-w64-x86_64-tesseract-data-fra
            mingw-w64-x86_64-tesseract-data-deu
            mingw-w64-x86_64-tesseract-data-spa
            mingw-w64-x86_64-tesseract-data-rus

      # ── 2. Checkout ───────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 3. Configure ──────────────────────────────────────────────────────
      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/mingw64 \
            -DENABLE_POPPLER=ON \
            -DENABLE_POTRACE=ON \
            -DENABLE_TESSERACT=ON

      # ── 4. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel

      # ── 5. Test ───────────────────────────────────────────────────────────
      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      # ── 6. Package ────────────────────────────────────────────────────────
      # windeployqt exits with error on MSYS2 (missing libGLESv2.dll) and
      # doesn't copy plugins. We use an iterative objdump loop that keeps
      # resolving DLL dependencies until no new DLLs are found (convergence).
      # Tested locally: 5 passes, 65+ DLLs collected correctly.
      #
      # IMPORTANT: use  if/fi  (not [ ] && cmd) and  || true  after pipelines
      # to survive MSYS2's  set -eo pipefail.
      - name: Package
        run: |
          mkdir -p dist/platforms dist/styles dist/imageformats dist/printsupport

          # Executables
          cp build/scantailor.exe dist/
          cp build/scantailor-cli.exe dist/ 2>/dev/null || true

          # Iteratively resolve ALL DLL dependencies until convergence.
          # Each pass scans every exe/dll in dist/ and copies any new
          # MinGW DLL dependency from /mingw64/bin/.
          prev_count=0
          shopt -s nullglob
          while true; do
            for file in dist/*.exe dist/*.dll; do
              objdump -p "$file" 2>/dev/null \
                | grep 'DLL Name:' | awk '{print $NF}' \
                | while read dep; do
                    if [ -f "/mingw64/bin/$dep" ] && [ ! -f "dist/$dep" ]; then
                      cp "/mingw64/bin/$dep" dist/
                    fi
                  done || true
            done

            curr_count=$(find dist -maxdepth 1 -name '*.dll' | wc -l)
            echo "DLL pass: $curr_count DLLs collected"
            if [ "$curr_count" -eq "$prev_count" ]; then
              break
            fi
            prev_count=$curr_count
          done
          shopt -u nullglob

          # Qt plugins (mandatory — Qt GUI won't start without platforms/qwindows.dll)
          QT_PLUGINS=/mingw64/share/qt5/plugins
          cp "$QT_PLUGINS/platforms/qwindows.dll"   dist/platforms/
          cp "$QT_PLUGINS/platforms/qminimal.dll"   dist/platforms/ 2>/dev/null || true
          cp "$QT_PLUGINS/imageformats/"*.dll       dist/imageformats/ 2>/dev/null || true
          cp "$QT_PLUGINS/styles/"*.dll             dist/styles/      2>/dev/null || true
          cp "$QT_PLUGINS/printsupport/"*.dll       dist/printsupport/ 2>/dev/null || true

          # Translation files (.qm)
          if [ -d build ]; then
            mkdir -p dist/translations
            cp build/*.qm dist/translations/ 2>/dev/null || true
            echo "Translation files: $(find dist/translations -name '*.qm' | wc -l)"
          fi

          # Tesseract language data (required for OCR at runtime)
          if [ -d /mingw64/share/tessdata ]; then
            mkdir -p dist/tessdata
            cp /mingw64/share/tessdata/*.traineddata dist/tessdata/ 2>/dev/null || true
            echo "Tessdata files: $(find dist/tessdata -name '*.traineddata' | wc -l)"
          fi

          # Summary
          echo "=== dist/ ==="
          find dist -name '*.dll' -o -name '*.exe' | sort
          echo "Total DLLs: $(find dist -name '*.dll' | wc -l)"

      # ── 7. ZIP with PowerShell ─────────────────────────────────────────────
      - name: Create ZIP
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath ScanTailor-Windows-x64.zip

      # ── 8. Upload ─────────────────────────────────────────────────────────
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ScanTailor-Windows-x64
          path: ScanTailor-Windows-x64.zip
          if-no-files-found: error
