name: Build Windows

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows x64 (MSYS2 MinGW64 Qt5)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Set up MSYS2 with MinGW64 and required packages ───────────────
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-translations
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-libtiff
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-zlib

      # ── 3. Configure ──────────────────────────────────────────────────────
      - name: Configure (CMake)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/mingw64 \
            -DENABLE_POPPLER=OFF

      # ── 4. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel

      # ── 5. Deploy Qt DLLs ─────────────────────────────────────────────────
      - name: Deploy Qt DLLs (windeployqt)
        run: |
          /mingw64/bin/windeployqt-qt5.exe build/scantailor.exe

      # ── 6. Collect all files into a zip ───────────────────────────────────
      - name: Package ZIP
        run: |
          mkdir -p dist
          cp build/scantailor.exe dist/
          cp build/scantailor-cli.exe dist/ || true
          # Copy all DLLs deployed by windeployqt
          cp build/*.dll dist/ 2>/dev/null || true
          cp -r build/platforms dist/ 2>/dev/null || true
          cp -r build/styles   dist/ 2>/dev/null || true
          cp -r build/imageformats dist/ 2>/dev/null || true
          cp -r build/translations dist/ 2>/dev/null || true
          cd dist && 7z a ../ScanTailor-Windows-x64.zip .

      # ── 7. Upload artifact ────────────────────────────────────────────────
      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ScanTailor-Windows-x64
          path: ScanTailor-Windows-x64.zip
          if-no-files-found: error
