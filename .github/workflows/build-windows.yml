name: Build Windows

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

# Cancel previous run on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows x64 (MSYS2 MinGW64 Qt5)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      # ── 1. Set up MSYS2 FIRST (required before checkout to fix line endings) ─
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-translations
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-libtiff
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-zlib

      # ── 2. Checkout ───────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 3. Configure ──────────────────────────────────────────────────────
      - name: Configure (CMake)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/mingw64 \
            -DENABLE_POPPLER=OFF

      # ── 4. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel

      # ── 5. Deploy Qt DLLs + plugins ───────────────────────────────────────
      - name: Deploy Qt DLLs and plugins
        run: |
          # windeployqt copies Qt DLLs; ignore libGLESv2 missing error
          /mingw64/bin/windeployqt-qt5.exe build/scantailor.exe || true

          # windeployqt may exit before copying plugins when libGLESv2 is missing.
          # Copy the essential Qt plugin directories directly from MSYS2.
          QT_PLUGINS=/mingw64/share/qt5/plugins
          for dir in platforms styles imageformats printsupport; do
            if [ -d "$QT_PLUGINS/$dir" ]; then
              mkdir -p build/$dir
              cp "$QT_PLUGINS"/$dir/*.dll build/$dir/ 2>/dev/null || true
              echo "Copied $dir: $(ls build/$dir/*.dll 2>/dev/null | wc -l) DLLs"
            fi
          done

      # ── 5b. Copy ALL MinGW runtime DLLs (ldd finds every /mingw64 dependency)
      - name: Copy MinGW runtime DLLs (via ldd)
        run: |
          ldd build/scantailor.exe \
            | grep -i '/mingw64/bin' \
            | awk '{print $3}' \
            | xargs -I{} cp -n {} build/
          echo "Non-Qt DLLs copied:"
          ls build/*.dll | xargs -n1 basename | grep -iv '^Qt'

      # ── 6. Package ZIP (PowerShell — no 7z needed in MSYS2) ───────────────
      - name: Package ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item build\scantailor.exe     dist\
          Copy-Item build\scantailor-cli.exe dist\ -ErrorAction SilentlyContinue
          Get-ChildItem build\*.dll -ErrorAction SilentlyContinue |
            Copy-Item -Destination dist\
          foreach ($d in @('platforms','styles','imageformats','translations')) {
            if (Test-Path "build\$d") { Copy-Item -Recurse "build\$d" dist\ }
          }
          Compress-Archive -Path dist\* -DestinationPath ScanTailor-Windows-x64.zip

      # ── 7. Upload artifact ────────────────────────────────────────────────
      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ScanTailor-Windows-x64
          path: ScanTailor-Windows-x64.zip
          if-no-files-found: error
