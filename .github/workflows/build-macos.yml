name: Build macOS

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-macos:
    name: macOS arm64 (Homebrew Qt5)
    runs-on: macos-latest        # macOS 14 Sonoma, arm64 (Apple Silicon)
    env:
      CMAKE_BUILD_TYPE: Release

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Install dependencies via Homebrew ─────────────────────────────
      - name: Install dependencies
        run: |
          brew update
          brew install qt@5 boost libtiff libjpeg-turbo libpng zlib

      # ── 3. Put Qt5 bin on PATH so CMake and macdeployqt are found ─────────
      - name: Set Qt5 environment
        run: |
          QT_PREFIX="$(brew --prefix qt@5)"
          echo "Qt5 prefix: $QT_PREFIX"
          echo "${QT_PREFIX}/bin" >> "$GITHUB_PATH"
          echo "CMAKE_PREFIX_PATH=${QT_PREFIX}" >> "$GITHUB_ENV"

      # ── 4. Configure ──────────────────────────────────────────────────────
      - name: Configure (CMake)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE="${CMAKE_BUILD_TYPE}" \
            -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}" \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="10.14"

      # ── 5. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel

      # ── 6. Produce .dmg ───────────────────────────────────────────────────
      - name: Package DMG
        run: cmake --build build --target dmg

      # ── 7. Upload artifact ────────────────────────────────────────────────
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ScanTailor-macOS
          path: build/ScanTailor-*.dmg
          if-no-files-found: error
