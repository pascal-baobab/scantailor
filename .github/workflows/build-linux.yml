name: Build Linux

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Linux x86_64 (Ubuntu 22.04, Qt5, AppImage)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      CMAKE_BUILD_TYPE: Release

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            qtbase5-dev qttools5-dev qttools5-dev-tools \
            libboost-dev libboost-test-dev \
            libtiff-dev libjpeg-dev libpng-dev zlib1g-dev \
            libxrender-dev libx11-dev \
            libfuse2 patchelf \
            librsvg2-bin

      # ── 3. Configure ─────────────────────────────────────────────────────
      - name: Configure (CMake)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE="${CMAKE_BUILD_TYPE}" \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON

      # ── 4. Build ─────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel

      # ── 5. Install into AppDir with FHS layout ───────────────────────────
      - name: Install into AppDir
        run: DESTDIR="$PWD/AppDir" cmake --install build

      # ── 6. Download linuxdeploy + Qt plugin ──────────────────────────────
      - name: Download deployment tools
        run: |
          wget -q \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage" \
            -O linuxdeploy
          wget -q \
            "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage" \
            -O linuxdeploy-plugin-qt
          chmod +x linuxdeploy linuxdeploy-plugin-qt

      # ── 7. Build AppImage ────────────────────────────────────────────────
      - name: Build AppImage
        env:
          QMAKE: /usr/bin/qmake
          OUTPUT: ScanTailor-Linux-x86_64.AppImage
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          # .desktop file (required by linuxdeploy)
          mkdir -p AppDir/usr/share/applications
          printf '[Desktop Entry]\nName=ScanTailor\nExec=scantailor\nIcon=scantailor\nType=Application\nCategories=Graphics;\n' \
            > AppDir/usr/share/applications/scantailor.desktop

          # Icon: convert SVG to 256x256 PNG (linuxdeploy requires standard icon sizes)
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          rsvg-convert -w 256 -h 256 resources/appicon.svg \
            -o AppDir/usr/share/icons/hicolor/256x256/apps/scantailor.png

          ./linuxdeploy \
            --appdir AppDir \
            --executable AppDir/usr/bin/scantailor \
            --desktop-file AppDir/usr/share/applications/scantailor.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/scantailor.png \
            --plugin qt \
            --output appimage

      # ── 8. Upload ────────────────────────────────────────────────────────
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ScanTailor-Linux-x86_64
          path: ScanTailor-Linux-x86_64.AppImage
          if-no-files-found: error
